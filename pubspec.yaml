name: connect_merge
description: A deterministic daily spatial merge puzzle.
publish_to: "none"
version: 1.0.0+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter_skill: ^0.9.36
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  google_sign_in: ^7.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_mobile_ads: ^9.0.0
  path_provider: ^2.1.4
  crypto: ^3.0.5
  supabase_flutter: ^2.16.0
  flutter_contacts: ^2.2.2
  app_links: ^7.1.2
  share_plus: ^13.1.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.6
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#060818"
  adaptive_icon_foreground: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#060818"
  image: "assets/images/icon.png"
  android_12:
    color: "#060818"
    image: "assets/images/icon.png"
    icon_background_color: "#060818"
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
